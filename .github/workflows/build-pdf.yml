name: Build PDF

on:
  push:

jobs:
  build:
    name: Compile main.tex
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Tectonic packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/Tectonic
          key: ${{ runner.os }}-tectonic-${{ hashFiles('**/*.tex') }}
          restore-keys: |
            ${{ runner.os }}-tectonic-

      - name: Set up Tectonic
        uses: wtfjoke/setup-tectonic@v4

      - name: Compile CV
        run: tectonic --outdir build main.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: cv-pdf
          path: build/main.pdf
          if-no-files-found: error
